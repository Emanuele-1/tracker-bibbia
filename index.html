<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracker Lettura Biblica</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #18bc9c;
            --bg: #f8f9fa;
            --card: #ffffff;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--primary);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container { max-width: 800px; width: 100%; }
        h1 { text-align: center; color: var(--primary); margin-bottom: 5px; }
        .subtitle { text-align: center; color: #7f8c8d; margin-bottom: 30px; }
        .navigation {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--card); padding: 15px; border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px;
        }
        button {
            background: var(--accent); color: white; border: none; padding: 10px 15px;
            border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px;
        }
        button:hover { opacity: 0.9; }
        .current-date-display { font-size: 18px; font-weight: bold; }
        .editor-zone {
            background: var(--card); padding: 25px; border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px;
            position: relative;
        }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; }
        input[type="text"], textarea {
            width: 100%; padding: 12px; border: 1px solid #dce4ec;
            border-radius: 8px; box-sizing: border-box; font-size: 16px; font-family: inherit;
        }
        textarea { resize: vertical; min-height: 120px; }
        .status-saved { color: #27ae60; font-size: 14px; font-weight: bold; display: none; }
        
        /* STILE CALENDARIO A GRIGLIA MENSILE */
        .calendar-preview {
            background: var(--card); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .calendar-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;
        }
        .calendar-title { font-size: 16px; font-weight: bold; }
        .calendar-nav-btn { background: var(--primary); padding: 5px 10px; font-size: 12px; }
        
        .weekdays-grid {
            display: grid; grid-template-columns: repeat(7, 1fr); text-align: center;
            font-weight: bold; font-size: 11px; color: #7f8c8d; margin-bottom: 5px;
            text-transform: uppercase;
        }
        .days-grid {
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px;
        }
        .calendar-day {
            background: #edf2f7; padding: 10px 5px; border-radius: 8px; text-align: center;
            font-size: 13px; font-weight: 600; cursor: pointer; border: 1px solid transparent;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            aspect-ratio: 1; min-height: 45px;
        }
        .calendar-day.empty { background: transparent; cursor: default; }
        .calendar-day.active { background: var(--primary); color: white; }
        .calendar-day.has-content { border-color: var(--accent); box-shadow: inset 0 0 0 1px var(--accent); }
        .calendar-day .mini-week { display: block; font-size: 8px; color: #7f8c8d; font-weight: normal; margin-top: 2px; }
        .calendar-day.active .mini-week { color: #bdc3c7; }

        .admin-badge {
            background: #e74c3c; color: white; padding: 3px 8px; 
            border-radius: 20px; font-size: 11px; font-weight: bold;
            cursor: pointer; margin-left: 10px; display: inline-block;
        }
        .admin-badge.logged { background: #27ae60; }
        
        input:disabled, textarea:disabled { 
            background: #fdfefe; 
            color: #2c3e50; 
            -webkit-text-fill-color: #2c3e50; 
            opacity: 1; 
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Tracker Lettura Biblica <span id="adminBtn" class="admin-badge">🔒 Sblocca Scrittura</span></h1>
    <div class="subtitle">Diario di lettura pubblico (Sola lettura per gli ospiti)</div>

    <div class="navigation">
        <button id="btnPrev">◀ Ieri</button>
        <div class="current-date-display" id="dateDisplay">Caricamento...</div>
        <button id="btnNext">Domani ▶</button>
    </div>

    <div class="editor-zone">
        <div class="input-group">
            <label for="inputReadings">📖 Capitoli letti oggi:</label>
            <input type="text" id="inputReadings" placeholder="Nessuna lettura inserita" disabled>
        </div>
        <div class="input-group">
            <label for="inputComment">✍️ Commento / riflessione:</label>
            <textarea id="inputComment" placeholder="Nessun commento inserito" disabled></textarea>
        </div>
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <button id="btnToday" style="background: #34495e;">Vai a Oggi</button>
            <span id="saveStatus" class="status-saved">✓ Salvato nel Cloud!</span>
        </div>
    </div>

    <div class="calendar-preview">
        <div class="calendar-header">
            <button id="btnPrevMonth" class="calendar-nav-btn">◀ Mese Prec.</button>
            <div class="calendar-title" id="calendarMonthTitle">Mese Anno</div>
            <button id="btnNextMonth" class="calendar-nav-btn">Mese Succ. ▶</button>
        </div>
        <div class="weekdays-grid">
            <div>Lun</div><div>Mar</div><div>Mer</div><div>Gio</div><div>Ven</div><div>Sab</div><div>Dom</div>
        </div>
        <div class="days-grid" id="calendarDaysGrid"></div>
    </div>
</div>

<script>
    // --- CONFIGURAZIONE DATABASE ---
    const FIREBASE_URL = "https://tracker-biblico-default-rtdb.europe-west1.firebasedatabase.app/"; 
    const SECRET_PASSWORD = "Emanuele"; 
    
    let currentDate = new Date(); 
    let calendarViewDate = new Date(); 
    let IS_ADMIN = false;
    let allDatabaseData = {}; 

    function getWeekNumber(d) {
        d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
        d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay()||7));
        var yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
        return Math.ceil((((d - yearStart) / 86400000) + 1)/7);
    }

    function formatDateKey(date) { return date.toISOString().split('T')[0]; }

    function formatFriendlyDate(date) {
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        const dataInItaliano = date.toLocaleDateString('it-IT', options);
        return dataInItaliano.charAt(0).toUpperCase() + dataInItaliano.slice(1) + ` (Sett. ${getWeekNumber(date)})`;
    }

    async function fetchAllData() {
        try {
            const response = await fetch(`${FIREBASE_URL}/letture.json`);
            const data = await response.json();
            allDatabaseData = data || {};
            loadDayData();
        } catch (error) {
            console.error("Errore nel caricamento dei dati dal cloud:", error);
        }
    }

    function loadDayData() {
        const key = formatDateKey(currentDate);
        dateDisplay.textContent = formatFriendlyDate(currentDate);

        const dayData = allDatabaseData[key];
        if (dayData) {
            inputReadings.value = dayData.readings || '';
            inputComment.value = dayData.comment || '';
        } else {
            inputReadings.value = '';
            inputComment.value = '';
        }
        renderCalendarGrid();
    }

    async function saveDayData() {
        if (!IS_ADMIN) return;
        
        const key = formatDateKey(currentDate);
        const dataToSave = {
            readings: inputReadings.value,
            comment: inputComment.value
        };

        allDatabaseData[key] = dataToSave;

        try {
            await fetch(`${FIREBASE_URL}/letture/${key}.json`, {
                method: 'PUT',
                body: JSON.stringify(dataToSave)
            });
            saveStatus.style.display = 'inline';
            setTimeout(() => { saveStatus.style.display = 'none'; }, 1000);
            renderCalendarGrid();
        } catch (error) {
            alert("Errore durante il salvataggio online!");
        }
    }

    function renderCalendarGrid() {
        const gridContainer = document.getElementById('calendarDaysGrid');
        const monthTitle = document.getElementById('calendarMonthTitle');
        gridContainer.innerHTML = '';

        const year = calendarViewDate.getFullYear();
        const month = calendarViewDate.getMonth();

        const nomeMese = calendarViewDate.toLocaleDateString('it-IT', { month: 'long', year: 'numeric' });
        monthTitle.textContent = nomeMese.charAt(0).toUpperCase() + nomeMese.slice(1);

        const firstDayOfMonth = new Date(year, month, 1);
        let startDayIndex = firstDayOfMonth.getDay() - 1;
        if (startDayIndex === -1) startDayIndex = 6; 

        const totalDaysInMonth = new Date(year, month + 1, 0).getDate();

        for (let i = 0; i < startDayIndex; i++) {
            const emptyDiv = document.createElement('div');
            emptyDiv.className = 'calendar-day empty';
            gridContainer.appendChild(emptyDiv);
        }

        for (let day = 1; day <= totalDaysInMonth; day++) {
            const loopDate = new Date(year, month, day);
            const key = formatDateKey(loopDate);
            const hasContent = allDatabaseData[key] && (allDatabaseData[key].readings || allDatabaseData[key].comment);

            const dayCell = document.createElement('div');
            dayCell.className = 'calendar-day';
            
            if (formatDateKey(currentDate) === key) dayCell.classList.add('active');
            if (hasContent) dayCell.classList.add('has-content');

            const numSettimana = getWeekNumber(loopDate);
            // MODIFICATO QUI: Ora mostra "sett. X" invece di "S.X"
            dayCell.innerHTML = `${day} <span class="mini-week">sett. ${numSettimana}</span>`;

            dayCell.onclick = () => {
                currentDate = new Date(loopDate);
                loadDayData();
            };

            gridContainer.appendChild(dayCell);
        }
    }

    document.getElementById('btnPrevMonth').onclick = () => {
        calendarViewDate.setMonth(calendarViewDate.getMonth() - 1);
        renderCalendarGrid();
    };
    document.getElementById('btnNextMonth').onclick = () => {
        calendarViewDate.setMonth(calendarViewDate.getMonth() + 1);
        renderCalendarGrid();
    };

    adminBtn.onclick = () => {
        if (IS_ADMIN) {
            IS_ADMIN = false;
            adminBtn.textContent = "🔒 Sblocca Scrittura";
            adminBtn.classList.remove('logged');
            inputReadings.disabled = true;
            inputComment.disabled = true;
        } else {
            const pass = prompt("Inserisci la password segreta per modificare:");
            if (pass === SECRET_PASSWORD) {
                IS_ADMIN = true;
                adminBtn.textContent = "🔓 Modalità Scrittura Attiva";
                adminBtn.classList.add('logged');
                inputReadings.disabled = false;
                inputComment.disabled = false;
                inputReadings.placeholder = "Es. Genesi 1-3";
                inputComment.placeholder = "Cosa ti ha colpito oggi?";
            } else if (pass !== null) {
                alert("Password errata!");
            }
        }
    };

    inputReadings.oninput = saveDayData;
    inputComment.oninput = saveDayData;

    document.getElementById('btnPrev').onclick = () => { 
        currentDate.setDate(currentDate.getDate() - 1); 
        calendarViewDate = new Date(currentDate); 
        loadDayData(); 
    };
    document.getElementById('btnNext').onclick = () => { 
        currentDate.setDate(currentDate.getDate() + 1); 
        calendarViewDate = new Date(currentDate); 
        loadDayData(); 
    };
    document.getElementById('btnToday').onclick = () => { 
        currentDate = new Date(); 
        calendarViewDate = new Date(currentDate);
        loadDayData(); 
    };

    fetchAllData();
</script>

</body>
</html>
